name: Main Build Release

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-build-release
  cancel-in-progress: true

jobs:
  build-and-publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: maxmarkusprogram-prtg-datasource
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
      RELEASE_TAG: main-build
      RELEASE_TITLE: Latest main build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: maxmarkusprogram-prtg-datasource/.nvmrc
          cache: npm
          cache-dependency-path: maxmarkusprogram-prtg-datasource/package-lock.json

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: maxmarkusprogram-prtg-datasource/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Build frontend
        run: npm run build

      - name: Install Mage
        uses: magefile/mage-action@6f50bbb8ea47d56e62dee92392788acbc8192d0b
        with:
          version: latest
          install-only: true

      - name: Build backend
        run: mage buildAll

      - name: Execute permissions on binaries
        run: chmod 0755 dist/gpx_*

      - name: Sign plugin
        if: ${{ env.GRAFANA_ACCESS_POLICY_TOKEN != '' }}
        run: npm run sign

      - name: Get plugin metadata
        id: metadata
        run: |
          PLUGIN_ID=$(node -p "require('./dist/plugin.json').id")
          PLUGIN_VERSION=$(node -p "require('./dist/plugin.json').info.version")
          ARCHIVE="${PLUGIN_ID}-${PLUGIN_VERSION}.zip"

          echo "plugin-id=${PLUGIN_ID}" >> "$GITHUB_OUTPUT"
          echo "plugin-version=${PLUGIN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Package plugin
        env:
          ARCHIVE: ${{ steps.metadata.outputs.archive }}
          PLUGIN_ID: ${{ steps.metadata.outputs.plugin-id }}
          RELEASE_DIR: release
        run: |
          rm -rf "${RELEASE_DIR}"
          mkdir -p "${RELEASE_DIR}"
          cp -R dist "${RELEASE_DIR}/${PLUGIN_ID}"
          cd "${RELEASE_DIR}"
          zip -r "../${ARCHIVE}" "${PLUGIN_ID}"
          cd ..
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Check plugin.json
        env:
          ARCHIVE: ${{ steps.metadata.outputs.archive }}
        run: |
          docker run --pull=always \
            -v "$PWD/${ARCHIVE}:/archive.zip" \
            grafana/plugin-validator-cli -analyzer=metadatavalid /archive.zip

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: maxmarkusprogram-prtg-datasource/${{ steps.metadata.outputs.archive }}

      - name: Publish release assets
        env:
          ARCHIVE: ${{ steps.metadata.outputs.archive }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag --force "${RELEASE_TAG}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${RELEASE_TAG}"

          printf 'Automated build from %s on main.\n\nCommit: %s/%s/commit/%s\n' \
            "${GITHUB_SHA::7}" \
            "${GITHUB_SERVER_URL}" \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_SHA}" > release-notes.md

          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file release-notes.md

            gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
              if [ -n "${asset}" ]; then
                gh release delete-asset "${RELEASE_TAG}" "${asset}" --yes
              fi
            done
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file release-notes.md \
              --prerelease \
              --verify-tag
          fi

          gh release upload "${RELEASE_TAG}" "${ARCHIVE}" "${ARCHIVE}.sha256" --clobber